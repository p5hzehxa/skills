  language: node
  prompt: |
    My SSO callback handler works for SP-initiated flow but breaks when users
    click our app tile in their Okta dashboard (IdP-initiated flow). The error
    is "Invalid state". How do I fix this?
  expected:
    methods: []
    envVars: []
