- id: audit-logs-node-event-naming
  product: audit-logs
  skill: workos-audit-logs
  skillType: generated
  language: node
  prompt: |
    I'm implementing WorkOS audit logs for our SaaS app. I need to log events
    for: user creates a document, user shares a document with a link, and admin
    deletes a team. What should my event type names look like? I want to follow
    whatever naming convention WorkOS expects.
  expected:
    methods:
      - workos.auditLogs.createEvent
    envVars:
      - WORKOS_API_KEY
    imports:
      - "@workos-inc/node"
    params:
      - action
      - actor
      - targets
    flowSteps:
      - use group.object.action naming convention
      - document.created for document creation
      - document.share_link.created for share link
      - admin action with actor type
      - include targets array with affected resources
    antiPatterns: []
    hallucinations:
      - workos.auditLogs.defineEventType
      - workos.auditLogs.registerSchema

