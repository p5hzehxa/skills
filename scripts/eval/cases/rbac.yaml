- id: rbac-node-check-permission
  product: rbac
  skill: workos-rbac
  skillType: generated
  language: node
  prompt: |
    I need to check if the current user has the "videos.create" permission
    before allowing them to upload a video in my Node.js app. I'm using WorkOS
    AuthKit with organization-level roles. Show me the authorization check pattern.
  expected:
    methods: []
    envVars:
      - WORKOS_API_KEY
    imports:
      - '@workos-inc/node'
    params:
      - permissions
      - organizationId
    flowSteps:
      - get user session or access token
      - read permissions from session or JWT claims
      - check if permissions include required permission
      - deny access if permission missing
    antiPatterns:
      - check role name instead of permission
      - check role slug instead of permission
    hallucinations:
      - workos.rbac.checkPermission
      - workos.rbac.authorize
      - workos.permissions.check

- id: rbac-node-role-assignment
  product: rbac
  skill: workos-rbac
  skillType: generated
  language: node
  prompt: |
    I need to assign the "billing-admin" role to a user in their organization
    using the WorkOS Node.js SDK. The role was configured in the WorkOS Dashboard.
  expected:
    methods:
      - workos.userManagement.listOrganizationMemberships
      - workos.userManagement.updateOrganizationMembership
    envVars:
      - WORKOS_API_KEY
    imports:
      - '@workos-inc/node'
    params:
      - roleSlug
      - organizationId
      - userId
    flowSteps:
      - list organization memberships to find membership ID
      - update organization membership with role slug
      - verify role exists in Dashboard
    antiPatterns:
      - create role via API instead of Dashboard
    hallucinations:
      - workos.rbac.assignRole
      - workos.roles.assign
      - workos.rbac.createRole

- id: rbac-node-permission-vs-slug
  product: rbac
  skill: workos-rbac
  skillType: generated
  language: node
  prompt: |
    I'm building an admin panel with different access levels. I have roles
    "admin", "editor", and "viewer" in WorkOS. Should I check `if (role ===
    'admin')` or check specific permissions? What's the correct pattern for
    authorization checks with WorkOS RBAC?
  expected:
    methods: []
    envVars: []
    imports: []
    params:
      - permissions
    flowSteps:
      - check permissions not role slugs
      - permissions survive role refactoring
      - slug checks break with custom roles
      - slug checks only for UI display
    antiPatterns:
      - check role slug for access control
      - role.slug === admin
    hallucinations:
      - workos.rbac.checkPermission
      - workos.rbac.hasRole

