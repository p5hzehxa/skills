    I assigned a user the "billing-admin" role via the WorkOS API, but after
    they log in again through Okta SSO, their role reverts to "member". What's
    happening and how do I fix it?
  expected:
    methods: []
    envVars: []
    imports: []
    params: []
    flowSteps:
      - IdP group mapping overrides API assignments
