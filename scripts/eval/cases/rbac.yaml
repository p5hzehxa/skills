- id: rbac-node-org-vs-env-roles
  product: rbac
  skill: workos-rbac
  skillType: generated
  language: node
  prompt: |
    I have a multi-tenant SaaS app. Most organizations use the same roles
    (admin, editor, viewer), but one enterprise customer needs a custom
    "compliance-officer" role. Can I create custom roles per-org in WorkOS,
    or do all orgs share the same roles?
  expected:
    methods: []
    envVars: []
    imports: []
    params: []
    flowSteps:
      - environment-level roles shared across all organizations
      - organization-level roles scoped to specific org
      - first org role creation makes org independent
      - org stops inheriting environment role changes
    antiPatterns: []
    hallucinations:
      - workos.rbac.createRole
      - workos.organizations.addRole

