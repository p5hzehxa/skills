- id: feature-flags-node-check-flag
  product: feature-flags
  skill: workos-feature-flags
  skillType: generated
  language: node
  prompt: |
    I want to check if the "new-dashboard" feature flag is enabled for the
    current user before showing them the new UI. I'm using WorkOS AuthKit
    in a Node.js app. How do I read feature flag values?
  expected:
    methods: []
    envVars:
      - WORKOS_API_KEY
      - WORKOS_CLIENT_ID
    imports:
      - '@workos-inc/node'
    params:
      - feature_flags
    flowSteps:
      - get user session via sealed session or AuthKit
      - read feature_flags claim from access token
      - check if flag is enabled
      - render UI based on flag value
    antiPatterns:
      - call a separate API endpoint for flag values
      - hardcode flag values
    hallucinations:
      - workos.featureFlags.get
      - workos.featureFlags.isEnabled
      - workos.flags.evaluate
      - workos.featureFlags.check

- id: feature-flags-node-refresh
  product: feature-flags
  skill: workos-feature-flags
  skillType: generated
  language: node
  prompt: |
    A user's feature flags seem stale — I enabled a flag for their organization
    in the Dashboard but they still see the old UI. How do I refresh feature
    flag values in a running session?
  expected:
    methods:
      - session.refresh
    envVars: []
    imports: []
    params: []
    flowSteps:
      - feature flags are in access token claims
      - stale tokens carry stale flag state
      - call session.refresh to get new token with updated flags
      - re-read feature_flags claim after refresh
    antiPatterns:
      - poll a feature flags API
      - implement a custom flag cache with TTL
      - fetch flags via API per request instead of reading token claim
      - manage flag staleness without refreshing the session token
    hallucinations:
      - workos.featureFlags.refresh
      - workos.featureFlags.sync
      - session.reloadFlags

- id: feature-flags-node-targeting
  product: feature-flags
  skill: workos-feature-flags
  skillType: generated
  language: node
  prompt: |
    I want to enable a "beta-export" feature flag for only two specific
    organizations in my SaaS app. How do I set up targeting with WorkOS
    Feature Flags?
  expected:
    methods:
      - workos.featureFlags.addFlagTarget
    envVars:
      - WORKOS_API_KEY
    imports:
      - '@workos-inc/node'
    params:
      - slug
      - resourceId
    flowSteps:
      - create flag in WorkOS Dashboard (definition is Dashboard-only)
      - call addFlagTarget for each organization ID (or configure Some targeting in Dashboard)
      - flag value delivered to clients via access token claims at runtime
      - no per-request API call needed at runtime
    antiPatterns:
      - implement client-side targeting logic
      - call API per request to evaluate flag at runtime
    hallucinations:
      - workos.featureFlags.setTargeting
      - workos.featureFlags.addOrganization
      - workos.featureFlags.createRule
      - workos.featureFlags.addTarget

- id: feature-flags-nextjs-check
  product: feature-flags
  skill: workos-feature-flags
  skillType: generated
  language: node
  framework: nextjs
  prompt: |
    I'm using AuthKit with Next.js. How do I check a feature flag in a
    server component to conditionally render a section of the page?
  expected:
    methods:
      - withAuth
    envVars:
      - WORKOS_API_KEY
      - WORKOS_CLIENT_ID
    imports:
      - '@workos-inc/authkit-nextjs'
    params:
      - featureFlags
    flowSteps:
      - call withAuth to get authenticated session
      - destructure featureFlags from the withAuth return value
      - conditionally render based on flag value
    antiPatterns:
      - fetch flags from a client-side API
      - use a separate feature flag service
      - call WorkOS API directly instead of reading session claims
    hallucinations:
      - workos.featureFlags.get
      - workos.featureFlags.isEnabled
      - workos.userManagement.getUserFeatureFlag
      - workos.userManagement.loadSealedSession
