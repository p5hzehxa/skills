- id: dsync-node-inactive-users
  product: directory-sync
  skill: workos-directory-sync
  skillType: generated
  language: node
  prompt: |
    We're handling dsync.user.deleted events to deprovision users, but some
    users are showing as suspended in Okta and still active in our app. It
    seems like not all removals trigger a deleted event. How should we handle
    user deprovisioning properly with WorkOS Directory Sync?
  expected:
    methods: []
    envVars: []
    imports: []
    params:
      - state
    flowSteps:
      - most providers soft-delete via state change not hard delete
      - handle dsync.user.updated with state inactive
      - dsync.user.deleted is rare and not the primary deprovisioning signal
      - use upsert pattern for idempotency
    antiPatterns:
      - only handle dsync.user.deleted for deprovisioning
    hallucinations:
      - workos.directorySync.deactivateUser
      - workos.directorySync.suspendUser

